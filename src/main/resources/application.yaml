app:
  jwt:
    secret: ${jwt_secret}
    expiration: 864000000 # 24 hours in milliseconds

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace

spring:
  application:
    name: vibecoder

  datasource:
    url: jdbc:postgresql://localhost:5432/vibecoder
    username: postgres
    password: ${db_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update   # use: none | validate | update | create | create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

cors:
  allowed-origins: "*"
  allow-credentials: false